<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Input Example</title>
</head>
<body>
    <fieldset style="width: 250px;">
        <legend>Date of Birth</legend>
        
        <input type="text" name="month" id="month" placeholder="MM" maxlength="2" style="width: 40px;">
        /
     
        <input type="text" name="day" id="day" placeholder="DD" maxlength="2" style="width: 40px;">
        /
      
        <input type="text" name="year" id="year" placeholder="YYYY" maxlength="4" style="width: 60px;">
        
        <hr width="200px" align="left">
    </fieldset> <br>

    <input type="button" value="Submit">
</body>
</html>
