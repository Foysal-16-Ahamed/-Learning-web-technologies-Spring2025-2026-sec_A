<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person Profile Form</title>
</head>
<body>
    <form>
    <table border="1" width="470px" align="center" style="border-collapse: collapse; text-align: left;">

        <tr height="50">
            <td colspan="3" align="center"><h2>PERSON PROFILE</h2></td>
        </tr>

        <tr height="40">
            <td width="120" align="center">Name</td>
            <td colspan="2" align="center"><input type="text" name="name" style="width: 90%; height: 25px;"></td>
        </tr>

        <tr height="40">
            <td align="center">Email</td>
            <td colspan="2" align="center"><input type="email" name="email" style="width: 90%; height: 25px;"></td>
        </tr>

        <tr height="40">
            <td align="center">Gender</td>
            <td colspan="2" align="center">
                <input type="radio" name="gender" id="male" value="Male"> <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="Female"> <label for="female">Female</label>
                <input type="radio" name="gender" id="other" value="Other"> <label for="other">Other</label>
            </td>
        </tr>

        <tr height="40">
            <td align="center">Date of Birth</td>
            <td colspan="2" align="center">
                <input type="text" name="dob_month" placeholder="MM" maxlength="2" style="width: 30px; height: 25px;"> /
                <input type="text" name="dob_day" placeholder="DD" maxlength="2" style="width: 30px; height: 25px;"> /
                <input type="text" name="dob_year" placeholder="YYYY" maxlength="4" style="width: 50px; height: 25px;">
                <span>(dd/mm/yyyy)</span>
            </td>
        </tr>

        <tr height="40">
            <td align="center">Blood Group</td>
            <td colspan="2" align="center">
                <select name="blood_group" style="width: 100px; height: 25px;">
                    <option value="">--Select--</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </td>
        </tr>

        <tr height="40">
            <td align="center">Degree</td>
            <td colspan="2" align="center">
                <input type="checkbox" name="degree" value="SSC"> SSC
                <input type="checkbox" name="degree" value="HSC"> HSC
                <input type="checkbox" name="degree" value="BSc"> BSc
                <input type="checkbox" name="degree" value="MSc"> MSc
            </td>
        </tr>

        <tr height="40">
            <td align="center">Photo</td>
            <td colspan="2" align="center"><input type="file" name="photo"></td>
        </tr>

        <tr height="40">
            <td colspan="3" align="right">
                <input type="submit" value="Submit" style="height: 30px; width: 80px;">
                <input type="reset" value="Reset" style="height: 30px; width: 80px;">
            </td>
        </tr>

    </table>
    </form>
</body>
</html>
